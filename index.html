<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>톡IQ - 카카오톡 지능 분석기</title>
<meta name="description" content="웩슬러 기반 5대 인지지표로 카카오톡 대화 속 당신의 IQ를 측정합니다">
<meta property="og:title" content="톡IQ - 카카오톡 지능 분석기">
<meta property="og:description" content="웩슬러 기반 5대 인지지표로 측정하는 나의 톡IQ는?">
<meta property="og:image" content="og.png?v=1">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;
  --cyan:#00d4ff;--gold:#fbbf24;--purple:#a855f7;--rose:#f43f5e;--green:#22c55e;--blue:#3b82f6;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;
  --border:#1e293b;--card:#0f172a;
  --glow-cyan:0 0 20px rgba(0,212,255,.25);
  --glow-gold:0 0 20px rgba(251,191,36,.25);
  --font:'Pretendard Variable',system-ui,-apple-system,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--t1);overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.screen{display:none;min-height:100dvh;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* ===== Intro ===== */
#screen-intro{justify-content:center;gap:24px;padding:40px 24px;text-align:center;background:radial-gradient(ellipse at 50% 30%,rgba(0,212,255,.08),transparent 60%)}
.intro-brain{font-size:80px;filter:drop-shadow(0 0 30px rgba(0,212,255,.4));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.intro-title{font-size:42px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px}
.intro-sub{font-size:16px;color:var(--t2);line-height:1.6;max-width:320px}
.intro-sub b{color:var(--gold)}
.btn-start{margin-top:16px;padding:16px 48px;border:none;border-radius:16px;font-size:18px;font-weight:700;font-family:var(--font);color:#000;background:linear-gradient(135deg,var(--cyan),#00b4d8);cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:var(--glow-cyan)}
.btn-start:active{transform:scale(.96)}

/* ===== Upload ===== */
#screen-upload{justify-content:center;gap:20px;padding:40px 24px;text-align:center}
.upload-title{font-size:24px;font-weight:700}
.upload-hint{font-size:14px;color:var(--t3);line-height:1.5;max-width:300px}
.dropzone{width:100%;max-width:360px;padding:48px 24px;border:2px dashed var(--border);border-radius:20px;background:var(--bg2);cursor:pointer;transition:border-color .2s,background .2s}
.dropzone.drag-over{border-color:var(--cyan);background:rgba(0,212,255,.05)}
.dropzone-icon{font-size:48px;margin-bottom:12px}
.dropzone-text{color:var(--t2);font-size:15px}
.dropzone-text b{color:var(--cyan)}
.upload-guide{margin-top:8px;padding:16px;border-radius:12px;background:var(--bg2);max-width:360px;text-align:left}
.upload-guide p{font-size:13px;color:var(--t3);line-height:1.6}
.upload-guide b{color:var(--t2)}
input[type=file]{display:none}

/* ===== Loading ===== */
#screen-loading{justify-content:center;gap:24px;padding:40px 24px;text-align:center;background:radial-gradient(ellipse at 50% 40%,rgba(168,85,247,.08),transparent 60%)}
.loading-brain{position:relative;width:120px;height:120px}
.brain-emoji{font-size:72px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.8}}
.neuron-particles{position:absolute;inset:0;pointer-events:none}
.neuron{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--cyan);animation:neuron 2s ease-in-out infinite}
.neuron:nth-child(1){top:10%;left:20%;animation-delay:0s}
.neuron:nth-child(2){top:30%;left:80%;animation-delay:.3s}
.neuron:nth-child(3){top:60%;left:15%;animation-delay:.6s}
.neuron:nth-child(4){top:70%;left:75%;animation-delay:.9s}
.neuron:nth-child(5){top:45%;left:50%;animation-delay:1.2s}
.neuron:nth-child(6){top:15%;left:60%;animation-delay:.4s}
.neuron:nth-child(7){top:80%;left:40%;animation-delay:.8s}
.neuron:nth-child(8){top:50%;left:90%;animation-delay:1.1s}
@keyframes neuron{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(2)}100%{opacity:0;transform:scale(0)}}
.loading-progress{width:100%;max-width:280px}
.progress-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .3s;width:0}
.loading-percent{margin-top:8px;font-size:14px;color:var(--t2);font-variant-numeric:tabular-nums}
.loading-msg{font-size:15px;color:var(--t2);min-height:20px}

/* ===== Wrapped Cards ===== */
#screen-wrapped{padding:0;position:relative;overflow:hidden;min-height:100dvh}
.cards-viewport{width:100%;height:100dvh;overflow:hidden;position:relative;touch-action:pan-y}
.card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;opacity:0;transform:translateX(100%);transition:opacity .4s,transform .4s;will-change:transform,opacity;gap:16px;text-align:center;overflow-y:auto}
.card.active{opacity:1;transform:translateX(0)}
.card.prev{opacity:0;transform:translateX(-100%)}
.card-bg-1{background:linear-gradient(135deg,#0a1628,#1a2744)}
.card-bg-2{background:linear-gradient(135deg,#1a0a2e,#2d1b69)}
.card-bg-3{background:linear-gradient(135deg,#0a1e2e,#0d3b66)}
.card-bg-4{background:linear-gradient(135deg,#2e0a1a,#691b3d)}
.card-bg-5{background:linear-gradient(135deg,#0a2e1a,#1b694d)}
.card-bg-6{background:linear-gradient(135deg,#1a1a0a,#3d3d1b)}
.card-bg-7{background:linear-gradient(135deg,#0a0e1a,#1a1e3a)}
.card-bg-8{background:linear-gradient(135deg,#000000,#1a0a2e)}
.card-bg-9{background:linear-gradient(135deg,#0a1628,#1a2744)}
.card-bg-10{background:linear-gradient(135deg,#0a0e1a,#0d1117)}

.card-label{font-size:13px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:2px}
.card-icon{font-size:56px;filter:drop-shadow(0 0 20px rgba(255,255,255,.2))}
.card-title{font-size:28px;font-weight:800;line-height:1.2}
.card-score{font-size:72px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
.card-interp{font-size:14px;font-weight:600;letter-spacing:0.5px}
.card-desc{font-size:14px;color:var(--t2);line-height:1.6;max-width:320px}

/* Bar chart */
.bar-group{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px}
.bar-item{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--t3);width:72px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(.22,1,.36,1);width:0}
.bar-val{font-size:12px;color:var(--t2);width:36px;font-variant-numeric:tabular-nums}

/* Mini cards (Card 6) */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px}
.mini-card{padding:16px 12px;border-radius:16px;background:rgba(255,255,255,.06);text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.mini-icon{font-size:32px}
.mini-name{font-size:12px;color:var(--t3);font-weight:600}
.mini-score{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums}

/* Radar chart (Card 7) */
.radar-wrap{width:280px;height:280px;margin:0 auto}
.radar-wrap svg{width:100%;height:100%}

/* IQ reveal (Card 8) */
.iq-number{font-size:96px;font-weight:900;font-variant-numeric:tabular-nums;background:linear-gradient(135deg,var(--gold),#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;filter:drop-shadow(0 0 30px rgba(251,191,36,.4))}
.tier-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:100px;font-size:20px;font-weight:700;animation:slam .6s cubic-bezier(.17,.67,.24,1.2)}
@keyframes slam{0%{transform:scale(3);opacity:0}100%{transform:scale(1);opacity:1}}

/* Ranking (Card 9) */
.ranking-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:8px}
.rank-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,.05)}
.rank-num{font-size:20px;font-weight:800;width:32px;text-align:center}
.rank-name{flex:1;font-size:15px;font-weight:600}
.rank-iq{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.rank-tier{font-size:14px}

/* Share (Card 10) */
.share-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
.btn-share{padding:14px 20px;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:transform .15s}
.btn-share:active{transform:scale(.96)}
.btn-capture{background:linear-gradient(135deg,var(--cyan),#00b4d8);color:#000}
.btn-link{background:var(--bg3);color:var(--t1)}
.btn-retry{background:transparent;border:1px solid var(--border);color:var(--t2)}
.btn-deep{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;margin-top:8px}

/* Dots indicator */
.dots{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:100}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s}
.dot.active{background:var(--cyan);width:24px;border-radius:4px}
.card-nav-hint{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--t3);z-index:100;animation:fadeOut 3s forwards}
@keyframes fadeOut{0%,60%{opacity:1}100%{opacity:0}}

/* ===== Deep Analysis ===== */
#screen-deep{padding:24px 16px 80px;gap:24px;background:var(--bg)}
.deep-header{text-align:center;width:100%}
.deep-header h2{font-size:24px;font-weight:800}
.deep-header p{font-size:14px;color:var(--t2);margin-top:4px}

.member-tabs{display:flex;gap:8px;overflow-x:auto;padding:4px 0;width:100%;max-width:480px;justify-content:center}
.member-tab{padding:8px 18px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--t2);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;white-space:nowrap;transition:all .2s}
.member-tab.active{background:var(--cyan);color:#000;border-color:var(--cyan)}

.deep-card{width:100%;max-width:480px;padding:24px;border-radius:20px;background:var(--bg2);border:1px solid var(--border)}
.deep-card h3{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.deep-iq-display{text-align:center;padding:24px 0}
.deep-iq-num{font-size:64px;font-weight:900;background:linear-gradient(135deg,var(--gold),#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.deep-tier{font-size:18px;font-weight:700;margin-top:8px}

.deep-radar{width:100%;max-width:300px;margin:0 auto}
.deep-radar svg{width:100%;height:auto}

.scores-grid{display:flex;flex-direction:column;gap:12px}
.score-row{display:flex;align-items:center;gap:10px}
.score-icon{font-size:20px;width:28px;text-align:center}
.score-name{font-size:13px;color:var(--t2);width:56px;flex-shrink:0}
.score-bar-track{flex:1;height:10px;border-radius:5px;background:rgba(255,255,255,.06);overflow:hidden}
.score-bar-fill{height:100%;border-radius:5px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.score-val{font-size:14px;font-weight:700;width:36px;text-align:right;font-variant-numeric:tabular-nums}

.deep-evidence{padding:16px;border-radius:12px;background:rgba(255,255,255,.03);margin-top:12px}
.deep-evidence p{font-size:13px;color:var(--t3);line-height:1.6}
.deep-evidence b{color:var(--t2)}

.btn-back{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 32px;border:none;border-radius:14px;background:var(--bg3);color:var(--t1);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}

/* Confetti */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confettiFall 3s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Participant picker (group) */
.picker-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.picker-overlay.active{display:flex}
.picker-box{background:var(--bg2);border-radius:20px;padding:28px 24px;max-width:360px;width:90%;text-align:center}
.picker-box h3{font-size:20px;font-weight:700;margin-bottom:16px}
.picker-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.picker-item{padding:14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--t1);font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s}
.picker-item:hover,.picker-item.selected{border-color:var(--cyan);background:rgba(0,212,255,.1)}
.btn-picker-confirm{padding:12px 36px;border:none;border-radius:12px;background:var(--cyan);color:#000;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer}

/* Capture target */
#capture-target{position:fixed;left:-9999px;top:0;width:420px;background:var(--bg);padding:32px 24px;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center}
#capture-target .capture-title{font-size:22px;font-weight:800;color:var(--t1)}
#capture-target .capture-iq{font-size:64px;font-weight:900;color:var(--gold)}
#capture-target .capture-tier{font-size:18px;font-weight:700}
#capture-target .capture-radar{width:280px;height:280px}
#capture-target .capture-footer{font-size:12px;color:var(--t3);margin-top:8px}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:100px;background:var(--bg3);color:var(--t1);font-size:14px;font-weight:600;z-index:400;animation:toastAnim 2s ease forwards;pointer-events:none}
@keyframes toastAnim{0%{opacity:0;transform:translate(-50%,20px)}10%{opacity:1;transform:translate(-50%,0)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-10px)}}

/* Responsive */
@media(max-width:380px){
  .card-score{font-size:56px}
  .iq-number{font-size:72px}
  .intro-title{font-size:34px}
  .card-title{font-size:24px}
  .radar-wrap{width:240px;height:240px}
}
</style>
</head>
<body>

<!-- Intro -->
<div id="screen-intro" class="screen active">
  <div class="intro-brain">🧠</div>
  <div class="intro-title">톡IQ</div>
  <p class="intro-sub">카카오톡 대화를 분석해서<br><b>웩슬러 기반 5대 인지지표</b>로<br>당신의 톡IQ를 측정합니다</p>
  <button class="btn-start" onclick="showScreen('upload')">분석 시작</button>
  <p style="font-size:12px;color:var(--t3);margin-top:8px">대화 파일은 서버에 저장되지 않습니다</p>
</div>

<!-- Upload -->
<div id="screen-upload" class="screen">
  <div class="upload-title">카카오톡 대화 파일 업로드</div>
  <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
    <div class="dropzone-icon">📂</div>
    <div class="dropzone-text"><b>여기를 터치</b>하거나<br>파일을 끌어다 놓으세요</div>
  </div>
  <input type="file" id="fileInput" accept=".txt">
  <div class="upload-guide">
    <p><b>내보내기 방법:</b><br>
    카카오톡 대화방 → 우측 상단 ≡ → 설정(⚙) → 대화 내보내기 → .txt 파일 저장</p>
  </div>
</div>

<!-- Loading -->
<div id="screen-loading" class="screen">
  <div class="loading-brain">
    <div class="brain-emoji">🧠</div>
    <div class="neuron-particles">
      <div class="neuron"></div><div class="neuron"></div><div class="neuron"></div>
      <div class="neuron"></div><div class="neuron"></div><div class="neuron"></div>
      <div class="neuron"></div><div class="neuron"></div>
    </div>
  </div>
  <div class="loading-progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="loading-percent" id="loadingPercent">0%</div>
  </div>
  <div class="loading-msg" id="loadingMsg">파일 열어보는 중...</div>
</div>

<!-- Wrapped Cards -->
<div id="screen-wrapped" class="screen">
  <div class="cards-viewport" id="cardsViewport"></div>
  <div class="dots" id="dots"></div>
</div>

<!-- Participant Picker (Group) -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-box">
    <h3>누구의 IQ를 볼까요?</h3>
    <div class="picker-list" id="pickerList"></div>
    <button class="btn-picker-confirm" onclick="confirmPicker()">선택</button>
  </div>
</div>

<!-- Deep Analysis -->
<div id="screen-deep" class="screen">
  <div class="deep-header">
    <h2>정밀 분석</h2>
    <p>5대 인지지표 상세 리포트</p>
  </div>
  <div class="member-tabs" id="memberTabs"></div>
  <div id="deepContent"></div>
  <button class="btn-back" onclick="showScreen('wrapped')">카드로 돌아가기</button>
</div>

<!-- Capture Target (off-screen) -->
<div id="capture-target"></div>

<script src="app.js?v=2"></script>
</body>
</html>
